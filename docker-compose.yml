version: '3.8'

services:
  # ==========================================
  # Database Service (PostgreSQL)
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: auto-litsenziya-db
    environment:
      POSTGRES_DB: auto_litsenziya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: isomiddin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_litsenziya"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Spring Boot Backend Service (Java 21)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-litsenziya-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/auto_litsenziya
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=isomiddin
      # Additional settings
      - SERVER_PORT=8080
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
